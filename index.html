<!DOCTYPE html>
<html>
  <head>
    <title>Photobooth</title>
    <link rel="stylesheet" href="home.css">
  </head>

  <body>
    <h1>Photobooth</h1>

    <div class="stage">
      <div class="viewfinder-frame">
      <div class="viewfinder" id="viewfinder">
        <video id="preview" autoplay playsinline></video>
        <canvas id="captureCanvas"></canvas>
        <img id="snapshot" alt="Captured photo" hidden>
        <div class="flash-overlay"></div>
        <div class="camcorder-overlay" hidden>REC ● 00:00</div>
      </div>
      </div>
      
      <button id="open-gallery" aria-label="Visit gallery">Gallery</button>
      <div id="gallery" class="gallery"></div>

      <div class="controls">
        <button class="btn" id="start-camera" aria-label="Turn on camera">ON</button>
        <button class="btn" id="capture-btn" aria-label="Take Photo">◉</button>
        <button class="btn" id="retake-btn" aria-label="Retake photo">↺</button>
        <button class="btn" id="strip-mode" aria-label="photo strip mode">4X</button>
      </div>

        <div class="filters">
          <button class="btn" data-filter="none" aria-label="No filter">OFF</button>
          <button class="btn" data-filter="bw" aria-label="B+W film">B/W</button>
          <button class="btn" data-filter="camcorder" aria-label="Camcorder">REC</button>
          <button class="btn" data-filter="digicam" aria-label="Digicam">DIGI</button>
          <button class="btn" data-filter="polaroid" aria-label="Polaroid">POLA</button>
      </div>

    <a href="https://olivia-vfx.github.io/"> Back to Portfolio </a>

    <script src="camera.js"></script>
  </body>
</html>
