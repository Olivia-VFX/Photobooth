<!DOCTYPE html>
<html>
  <head>
    <title>Photobooth</title>
    <link rel="stylesheet" href="home.css">
  </head>

  <body>
    <h1>Photobooth</h1>

    <div class="stage">
      <div class="viewfinder" id="viewfinder">
        <video id="preview" autoplay playsinline></video>
        <canvas id="captureCanvas"></canvas>
        <img id="snapshot" alt="Captured photo" hidden>
        <div class="flash-overlay"></div>
        <div class="camcorder-overlay" hidden>REC ● 00:00</div>
      </div>
      
      <button class="btn" id="open-gallery">Visit Gallery</button>
      <div id="gallery" class="gallery"></div>

      <div class="controls">
        <button class="btn" id="start-camera" >Turn on camera!!</button>
        <button class="btn" id="capture-btn">Take Photo!!</button>
        <button class="btn" id="retake-btn">Retake Photo</button>
        <button class="btn" id="strip-mode">Photo Strip Mode</button>
      </div>

        <div class="filters">
          <button class="btn" data-filter="none">No Filter</button>
          <button class="btn" data-filter="bw">B+W Film</button>
          <button class="btn" data-filter="camcorder">Camcorder</button>
          <button class="btn" data-filter="digicam">Digicam</button>
          <button class="btn" data-filter="polaroid">Polaroid</button>
      </div>

    <a href="https://olivia-vfx.github.io/"> Back to Portfolio </a>

    <script src="camera.js"></script>
  </body>
</html>
